<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a3a2a">
<title>Kai Clarke | PEAK Recruiting</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1f17;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;padding:20px}
.card{background:#1a2e22;border-radius:24px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.hero{position:relative;background:#1a3a2a;padding:40px 24px 28px;text-align:center}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(200,168,75,.12) 0%,transparent 70%);pointer-events:none}
.photo{width:96px;height:96px;border-radius:50%;border:3px solid #c8a84b;overflow:hidden;margin:0 auto 16px;position:relative;z-index:1}
.photo img{width:100%;height:100%;object-fit:cover;object-position:top center}
.name{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.3px;margin-bottom:4px;position:relative;z-index:1}
.title{font-size:12px;color:#c8a84b;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;margin-bottom:6px;position:relative;z-index:1}
.tagline{font-size:13px;color:rgba(255,255,255,.55);position:relative;z-index:1;line-height:1.5}
.divider{height:1px;background:rgba(255,255,255,.06);margin:0 20px}
.contact-list{padding:8px 0}
.contact-row{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.05)}
.contact-row:last-child{border-bottom:none}
.icon-wrap{width:38px;height:38px;border-radius:50%;background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-wrap svg{width:16px;height:16px;stroke:#c8a84b;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.contact-info{flex:1}
.contact-label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.contact-value{font-size:15px;color:#e8e8e8;font-weight:500;text-decoration:none}
a.contact-value:hover{color:#c8a84b}
.actions{padding:16px 20px 10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.actions-full{padding:0 20px 10px;display:flex;flex-direction:column;gap:10px}
.actions-full .btn{width:100%}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:#c8a84b;color:#1a2e22}
.btn-secondary{background:rgba(255,255,255,.07);color:#e8e8e8;border:1px solid rgba(255,255,255,.1)}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.footer{padding:14px 20px 22px;text-align:center;border-top:1px solid rgba(255,255,255,.05)}
.footer-text{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.3px}
.peak-mark{color:rgba(200,168,75,.5);font-weight:600}
</style>
</head>
